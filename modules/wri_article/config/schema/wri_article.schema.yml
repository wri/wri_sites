# Schema for the configuration files of the WRI article module.
wri_article.settings:
  type: config_object
  label: 'WRI article settings'
  mapping:
    enable_main_content_b:
      type: boolean
      label: 'Default to main_content_b'
      constraints:
        NotNull: [ ]
    technical_perspective_template:
      type: sequence
      label: 'Technical Perspective template'
      sequence:
        type: integer
        label: 'Term ID'
    update_template:
      type: sequence
      label: 'Update template'
      sequence:
        type: integer
        label: 'Term ID'
    news_template:
      type: sequence
      label: 'News template'
      sequence:
        type: integer
        label: 'Term ID'
