langcode: en
status: true
dependencies:
  config:
    - filter.format.basic_html
  module:
    - ckeditor5
format: basic_html
editor: ckeditor5
settings:
  toolbar:
    items:
      - bold
      - italic
      - underline
      - '|'
      - link
      - '|'
      - style
      - sourceEditing
  plugins:
    ckeditor5_sourceEditing:
      allowed_tags:
        - '<span class>'
        - '<div class>'
        - '<a name>'
    ckeditor5_style:
      styles:
        -
          label: Gold
          element: '<span class="has-gold-color">'
        -
          label: Maroon
          element: '<span class="has-maroon-color">'
        -
          label: 'Serif font'
          element: '<span class="font-serif">'
        -
          label: 'H2 (pfp)'
          element: '<p class="pfp-h2-bold">'
        -
          label: 'H2 italic (pfp)'
          element: '<p class="pfp-h2-bold-italic">'
        -
          label: 'Blue 200 (pfp)'
          element: '<p class="pfp-text-blue-200">'
    editor_advanced_link_link:
      enabled_attributes:
        - class
        - target
image_upload:
  status: false
